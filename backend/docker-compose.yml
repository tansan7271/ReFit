services:
  db:
    image: mysql:8.0
    container_name: refit_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - refit_db_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:3306:3306"  # 로컬 개발용 (alembic 등) — 외부엔 닫혀 있음

  api:
    build: .
    container_name: refit_api
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"  # localhost에서만 접근, cloudflared가 외부 프록시 담당

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: refit_tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --url http://api:8000
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - api

volumes:
  refit_db_data:
