services:
  db:
    image: mysql:8.0
    container_name: persona_fit_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: persona_fit
      MYSQL_USER: persona_fit_user
      MYSQL_PASSWORD: fit1234
    ports:
      - "3306:3306"
    volumes:
      - persona_fit_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  persona_fit_data:
